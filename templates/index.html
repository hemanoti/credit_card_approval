<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Credit Card Approval Prediction</h2>

<p style="text-align:center;color:gray;">
AI Powered Credit Card Approval System
</p>

<form action="/predict" method="POST">

<label>Gender</label><br>
<select name="CODE_GENDER" required>
    <option value="">Select Gender</option>
    <option value="1">Male</option>
    <option value="0">Female</option>
</select><br><br>

<label>Own Car</label><br>
<select name="FLAG_OWN_CAR" required>
    <option value="">Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Own House</label><br>
<select name="FLAG_OWN_REALTY" required>
    <option value="">Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Number of Children</label><br>
<input type="number" name="CNT_CHILDREN" min="0" max="10" required><br><br>

<label>Annual Income</label><br>
<input type="number" name="AMT_INCOME_TOTAL" min="0" placeholder="Example: 500000" required><br><br>

<label>Income Type</label><br>
<select name="NAME_INCOME_TYPE" required>
    <option value="">Select</option>
    <option value="4">Working</option>
    <option value="0">Commercial Associate</option>
    <option value="1">Pensioner</option>
    <option value="2">State Servant</option>
    <option value="3">Student</option>
</select><br><br>

<label>Education Type</label><br>
<select name="NAME_EDUCATION_TYPE" required>
    <option value="">Select</option>
    <option value="1">Higher Education</option>
    <option value="4">Secondary / Secondary Special</option>
    <option value="2">Incomplete Higher</option>
    <option value="3">Lower Secondary</option>
    <option value="0">Academic Degree</option>
</select><br><br>

<label>Family Status</label><br>
<select name="NAME_FAMILY_STATUS" required>
    <option value="">Select</option>
    <option value="1">Married</option>
    <option value="3">Single / Not Married</option>
    <option value="0">Civil Marriage</option>
    <option value="2">Separated</option>
    <option value="4">Widow</option>
</select><br><br>

<label>Housing Type</label><br>
<select name="NAME_HOUSING_TYPE" required>
    <option value="">Select</option>
    <option value="1">House / Apartment</option>
    <option value="4">Rented Apartment</option>
    <option value="2">Municipal Apartment</option>
    <option value="0">Co-op Apartment</option>
    <option value="3">Office Apartment</option>
    <option value="5">With Parents</option>
</select><br><br>

<label>Age (Years)</label><br>
<input type="number" name="AGE" min="18" max="100" placeholder="Example: 40" required><br><br>

<label>Years Employed</label><br>
<input type="number" name="YEARS_EMPLOYED" min="0" max="50" placeholder="Example: 10" required><br><br>

<label>Occupation</label><br>
<select name="OCCUPATION_TYPE" required>
    <option value="">Select Occupation</option>
    <option value="10">Manager</option>
    <option value="8">Laborers</option>
    <option value="4">Drivers</option>
    <option value="7">IT Staff</option>
    <option value="0">Accountants</option>
    <option value="3">Core Staff</option>
    <option value="14">Sales Staff</option>
    <option value="11">Medicine Staff</option>
    <option value="16">Security Staff</option>
    <option value="6">High Skill Tech Staff</option>
    <option value="1">Cleaning Staff</option>
    <option value="2">Cooking Staff</option>
    <option value="5">HR Staff</option>
    <option value="9">Low-skill Laborers</option>
    <option value="12">Private Service Staff</option>
    <option value="13">Realty Agents</option>
    <option value="15">Secretaries</option>
    <option value="17">Waiters/Barmen Staff</option>
</select><br><br>

<label>Family Members</label><br>
<input type="number" name="CNT_FAM_MEMBERS" min="1" max="10" required><br><br>

<input type="submit" value="Predict">

</form>

</div>

</body>
</html>
